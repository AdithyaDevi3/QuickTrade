spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/stocks_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

logging:
  level:
     org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE

# Polygon.io API key — override with POLYGON_API_KEY environment variable in production
polygon:
  api-key: ${POLYGON_API_KEY:mjuTBMGVNRgdO10k4_2tbNeNYBRUu8Vb}
